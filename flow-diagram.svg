  <text x="460" y="36" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#0f172a">Job Finder Kit — how it works</text>
  <text x="460" y="58" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="400" fill="#64748b">Folder + Cursor + AI helper. You review and apply yourself.</text>
  <text x="64" y="91" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="400" fill="#475569">AI helper in Cursor</text>
  <text x="224" y="91" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="400" fill="#475569">You</text>
  <text x="304" y="91" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="400" fill="#475569">Files / scripts</text>
  <text x="40" y="118" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#1e40af">A. First-time setup (once)</text>
  <text x="40" y="606" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#1e40af">B. Each day / each application</text>
  <text x="460" y="155" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="400" fill="#0f172a">Unzip or clone, install Cursor</text>
  <text x="460" y="170" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="400" fill="#475569">File → Open Folder → this folder</text>
  <text x="460" y="244" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="400" fill="#0f172a">Fill AGENTS.md and cv-base (your resume)</text>
  <text x="460" y="323" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="600" fill="#0f172a">Need PDF?</text>
  <rect x="233.4" y="279" width="33.2" height="18" class="label-bg" rx="4"/>
  <text x="250" y="292" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="600" fill="#475569">yes</text>
  <rect x="624.6" y="279" width="90.8" height="18" class="label-bg" rx="4"/>
  <text x="670" y="292" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="600" fill="#475569">no / hh only</text>
  <text x="158" y="430" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="400" fill="#0f172a">Python + ONBOARDING step 4</text>
  <text x="460" y="543" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="400" fill="#0f172a">First chat: @AGENTS.md — add jobs to tracker</text>
  <text x="460" y="558" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="400" fill="#475569">Agent mode · Cmd+L / Ctrl+L</text>
  <text x="460" y="663" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="400" fill="#0f172a">Vacancies in tracker.md (numbered table)</text>
  <text x="460" y="741" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="400" fill="#0f172a">You: I like #3 and #7</text>
  <text x="460" y="817" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="400" fill="#0f172a">Helper: applications/company-role/</text>
  <text x="460" y="832" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="400" fill="#475569">vacancy.md · cover.md · cv.md (if not hh)</text>
  <text x="460" y="907" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="400" fill="#0f172a">You read, edit, say OK</text>
  <text x="460" y="991" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="600" fill="#0f172a">Where to apply?</text>
  <rect x="172.0" y="931" width="46.0" height="18" class="label-bg" rx="4"/>
  <text x="195" y="944" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="600" fill="#475569">hh.ru</text>
  <rect x="686.0" y="931" width="78.0" height="18" class="label-bg" rx="4"/>
  <text x="725" y="944" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="600" fill="#475569">other site</text>
  <text x="163" y="1089" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="400" fill="#0f172a">cover.md + resume</text>
  <text x="163" y="1104" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="400" fill="#475569">on hh (cv-base-ru)</text>
  <text x="757" y="1089" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="400" fill="#0f172a">cv.md, PDF if needed</text>
  <text x="757" y="1104" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="400" fill="#475569">(generate_cv_unified.py)</text>
  <text x="460" y="1203" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="400" fill="#0f172a">You apply on the employer site</text>
  <text x="460" y="1279" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="400" fill="#0f172a">Set status applied in tracker</text>
  <text x="460" y="1328" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="400" fill="#0f172a">Key files: tracker.md · AGENTS.md · cv-base · applications/</text>
  <text x="460" y="1346" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="400" fill="#64748b">Details: ONBOARDING.md, README.md</text>
