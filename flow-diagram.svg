  </defs>

  <text x="460" y="36" text-anchor="middle" class="title">Job Finder Kit - how it works</text>
  <text x="460" y="58" text-anchor="middle" class="subtitle">Folder + Cursor + AI helper. You review and apply yourself.</text>
  <text x="64" y="92" class="text-sm">AI helper in Cursor</text>
  <text x="224" y="92" text-anchor="middle" class="text-sm">You</text>
  <text x="304" y="92" text-anchor="middle" class="text-sm">Files / scripts</text>
  <text x="40" y="128" class="section">A. First-time setup (once)</text>
  <text x="460" y="162" text-anchor="middle" class="text">Unzip or clone, install Cursor</text>
  <text x="460" y="178" text-anchor="middle" class="text-sm">File - Open Folder - this folder</text>
  <text x="460" y="240" text-anchor="middle" class="text">Fill AGENTS.md and cv-base (your resume)</text>
  <text x="460" y="308" text-anchor="middle" class="text">Need PDF?</text>
  <text x="290" y="300" text-anchor="middle" class="text-sm">yes</text>
  <text x="140" y="314" text-anchor="middle" class="text-sm">Python, ONBOARDING step 4</text>
  <text x="610" y="300" text-anchor="middle" class="text-sm">no / hh only</text>
  <text x="460" y="380" text-anchor="middle" class="text">First chat: @AGENTS.md - add jobs to tracker</text>
  <text x="460" y="396" text-anchor="middle" class="text-sm">Agent mode, Cmd+L / Ctrl+L</text>
  <text x="40" y="448" class="section">B. Each day / each application</text>
  <text x="460" y="488" text-anchor="middle" class="text">Vacancies in tracker.md (numbered table)</text>
  <text x="460" y="556" text-anchor="middle" class="text">You: I like #3 and #7</text>
  <text x="460" y="620" text-anchor="middle" class="text">Helper: applications/company-role/</text>
  <text x="460" y="638" text-anchor="middle" class="text-sm">vacancy.md, cover.md, cv.md (if not hh)</text>
  <text x="460" y="704" text-anchor="middle" class="text">You read, edit, say OK</text>
  <text x="460" y="778" text-anchor="middle" class="text">Where to apply?</text>
  <text x="265" y="770" text-anchor="middle" class="text-sm">hh.ru</text>
  <text x="140" y="778" text-anchor="middle" class="text-sm">cover.md + resume</text>
  <text x="140" y="794" text-anchor="middle" class="text-sm">on hh (cv-base-ru)</text>
  <text x="655" y="770" text-anchor="middle" class="text-sm">other site</text>
  <text x="760" y="772" text-anchor="middle" class="text-sm">cv.md, PDF if needed</text>
  <text x="760" y="788" text-anchor="middle" class="text-sm">(generate_cv_unified.py)</text>
  <text x="460" y="900" text-anchor="middle" class="text">You apply on the employer site</text>
  <text x="460" y="968" text-anchor="middle" class="text">Set status applied in tracker</text>
  <text x="460" y="1024" text-anchor="middle" class="text" font-weight="bold">Key files</text>
  <text x="460" y="1044" text-anchor="middle" class="text-sm">tracker.md - list; AGENTS.md - rules; cv-base - resume; applications/ - drafts</text>
  <text x="460" y="1062" text-anchor="middle" class="text-sm">Details: ONBOARDING.md, README.md</text>
  <text x="460" y="1148" text-anchor="middle" class="subtitle">find-me-a-job / flow-diagram.svg</text>

